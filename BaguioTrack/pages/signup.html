<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Baguio Track | Sign Up</title>

<link rel="stylesheet" href="../assets/css/style.css" />

<style>
/* Small layout improvements */

#optionsContainer{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:10px;
}

#optionsContainer button{
  padding:12px;
  border-radius:6px;
  font-size:15px;
  cursor:pointer;
}

.admin-link{
  margin-top:15px;
  text-align:center;
  font-size:14px;
}
</style>

</head>

<body>

<section id="login-section">
<div class="login-container">

<img src="../assets/images/logo.png" alt="Baguio Track Logo" class="logo" />

<h1>Baguio Track</h1>
<p>Choose how you'd like to continue exploring.</p>

<form id="signupForm">

<div id="optionsContainer">

<button type="button" id="guestBtn"
style="background:#ffffff; color:#154d2e; border:1px solid #cfcfcf;">
Continue as Guest
</button>

<button type="button" id="googleSignUpBtn"
style="background:#ffffff; color:#154d2e; border:1px solid #cfcfcf;">
Continue with Google
</button>

</div>

<div class="admin-link">
<a href="adminlogin.html">Sign In as Admin</a>
</div>

</form>

</div>
</section>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyDPFnyJC66A-HQC3dKCQQ4SobAFRezx7fU",
authDomain: "baguio-track-c702f.firebaseapp.com",
projectId: "baguio-track-c702f",
storageBucket: "baguio-track-c702f.firebasestorage.app",
messagingSenderId: "27598181344",
appId: "1:27598181344:web:97bf7dd2a32dbfe14ed185"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* ===== GUEST LOGIN ===== */

document.getElementById("guestBtn").addEventListener("click", () => {

localStorage.setItem("isLoggedIn","true");
localStorage.setItem("isGuest","true");

window.location.href="home.html";

});

/* ===== GOOGLE SIGN IN ===== */

document.getElementById("googleSignUpBtn").addEventListener("click", async () => {

try{

const provider = new GoogleAuthProvider();
const result = await signInWithPopup(auth, provider);

const user = result.user;

/* increase registered users count */
const regCount = parseInt(localStorage.getItem("registeredUsers") || "0");
localStorage.setItem("registeredUsers", regCount + 1);

/* save login state */
localStorage.setItem("isLoggedIn","true");
localStorage.setItem("userEmail", user.email);
localStorage.removeItem("isGuest");

window.location.href="home.html";

}catch(error){

alert("❌ " + error.message);

}

});

</script>

</body>
</html>
