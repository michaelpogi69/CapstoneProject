<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baguio Track | Login</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

<section id="login-section">
    <div class="login-container">
      <img src="../assets/images/logo.png" alt="Baguio Track Logo" class="logo" />
      <h1>Baguio Track</h1>
      <p>Access your account to start exploring.</p>

      <form id="loginForm">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required />

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required />

        <button type="submit">Sign In</button>

        <button type="button" id="googleSignInBtn" style="margin-top:10px; background:#ffffff; color:#154d2e; border:1px solid #cfcfcf;">Continue with Google</button>

        <p class="register-link">
          Don't have an account? <a href="signup.html">Sign Up</a>
        </p>
      </form>
    </div>
  </section>

  <!-- 🔥 FIREBASE LOGIN (GMAIL ONLY) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup }
      from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDPFnyJC66A-HQC3dKCQQ4SobAFRezx7fU",
      authDomain: "baguio-track-c702f.firebaseapp.com",
      projectId: "baguio-track-c702f",
      storageBucket: "baguio-track-c702f.firebasestorage.app",
      messagingSenderId: "27598181344",
      appId: "1:27598181344:web:97bf7dd2a32dbfe14ed185"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
    const strongPasswordRegex = /^(?=.*[A-Za-z])(?=.*\d).{8,}$/;

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value;

      if (!emailRegex.test(email)) {
        alert("❌ Please enter a valid email address.");
        return;
      }

      if (!strongPasswordRegex.test(password)) {
        alert("❌ Password must be at least 8 characters and include letters and numbers.");
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
        localStorage.setItem("isLoggedIn", "true");
        window.location.href = "home.html";
      } catch (error) {
        alert("❌ " + error.code + " — " + error.message);
      }
    });

    document.getElementById("googleSignInBtn").addEventListener("click", async () => {
      try {
        const provider = new GoogleAuthProvider();
        await signInWithPopup(auth, provider);
        localStorage.setItem("isLoggedIn", "true");
        window.location.href = "home.html";
      } catch (error) {
        alert("❌ " + error.code + " — " + error.message);
      }
    });
  </script>

</body>
</html>
