<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Baguio Track | Sign Up</title>

<link rel="stylesheet" href="/BaguioTrack/assets/css/style.css" />

<style>
#optionsContainer{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:10px;
}

#optionsContainer button{
  width:100%;
  padding:12px;
  border-radius:6px;
  font-size:15px;
  cursor:pointer;
}

.admin-link{
  margin-top:15px;
  text-align:center;
  font-size:14px;
}

.admin-link a.button-like{
  display:block;
  width:100%;
  max-width:100%;
  margin:0 auto;
  box-sizing:border-box;
  padding:12px;
  background:#ffffff;
  color:#154d2e;
  border:1px solid #cfcfcf;
  border-radius:6px;
  text-decoration:none;
  font-size:15px;
  cursor:pointer;
}

.admin-link a.button-like:hover{
  background:#f9f9f9;
}
</style>
</head>

<body>

<section id="login-section">
  <div class="login-container">

    <img src="/BaguioTrack/assets/images/logo.png" alt="Baguio Track Logo" class="logo" />

    <h1>Baguio Track</h1>
    <p>Choose how you'd like to start exploring.</p>

    <form id="signupForm">
      <div id="optionsContainer">
        <button
          type="button"
          id="googleSignUpBtn"
          style="background:#ffffff; color:#154d2e; border:1px solid #cfcfcf;"
        >
          Continue with Google
        </button>
      </div>

      <div class="admin-link">
        <a href="/BaguioTrack/pages/adminlogin.html" class="button-like">Sign In as Admin</a>
      </div>
    </form>

  </div>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDPFnyJC66A-HQC3dKCQQ4SobAFRezx7fU",
  authDomain: "baguio-track-c702f.firebaseapp.com",
  projectId: "baguio-track-c702f",
  storageBucket: "baguio-track-c702f.firebasestorage.app",
  messagingSenderId: "27598181344",
  appId: "1:27598181344:web:97bf7dd2a32dbfe14ed185"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("googleSignUpBtn").addEventListener("click", async () => {
  try {
    const provider = new GoogleAuthProvider();
    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    const regCount = parseInt(localStorage.getItem("registeredUsers") || "0");
    localStorage.setItem("registeredUsers", regCount + 1);

    localStorage.setItem("isLoggedIn", "true");
    localStorage.setItem("userEmail", user.email);

    if (user.displayName) {
      localStorage.setItem("baguioTrackUserName", user.displayName);
    }

    if (user.photoURL) {
      localStorage.setItem("baguioTrackProfileImage", user.photoURL);
    }

    window.location.href = "/BaguioTrack/pages/home.html";
  } catch (error) {
    alert("❌ " + error.message);
  }
});
</script>

</body>
</html>
